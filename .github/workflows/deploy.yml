name: Pipeline CI/CD DevOps

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar el codigo fuente
      uses: actions/checkout@v4

    - name: Iniciar sesion en Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Construir y subir imagen de Docker
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: jmonge13/api-devops:latest 

  deploy:
    runs-on: [self-hosted, production]
    needs: build-and-push
    steps:
    - name: Descargar codigo fuente en el servidor
      uses: actions/checkout@v4

    - name: Descargar la nueva imagen y reiniciar contenedores
      run: |
        cd ${{ github.workspace }}
        docker compose down
        docker compose build --no-cache
        docker compose up -d
